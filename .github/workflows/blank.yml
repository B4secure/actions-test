name: Daily News Collection

on:
  schedule:
    - cron: "0 7 * * 2-5"
      timezone: "Europe/London"   # Tue–Fri morning → 24h
    - cron: "0 14 * * 1-5"
      timezone: "Europe/London"   # Mon–Fri afternoon → 7h
    - cron: "0 7 * * 1"
      timezone: "Europe/London"   # Monday morning → 72h

  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "Override lookback hours"
        required: false
        default: ""
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 🔑 CORE FIX: deterministic lookback
      - name: Resolve config
        shell: bash
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Schedule: ${{ github.event.schedule }}"
          echo "UTC: $(date -u)"
          echo "London: $(TZ=Europe/London date)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.lookback_hours }}" ]; then
            LOOKBACK_HOURS="${{ github.event.inputs.lookback_hours }}"
          
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1" ]; then
            LOOKBACK_HOURS=72   # Monday morning

          elif [ "${{ github.event.schedule }}" = "0 7 * * 2-5" ]; then
            LOOKBACK_HOURS=24   # Tue-Fri morning

          else
            LOOKBACK_HOURS=7    # Mon-Fri afternoon
          fi

          echo "LOOKBACK_HOURS=$LOOKBACK_HOURS" >> $GITHUB_ENV
          echo "PAST_DAYS=2" >> $GITHUB_ENV
          echo "MAX_ITEMS=30" >> $GITHUB_ENV
          echo "DUP_THRESHOLD=0.7" >> $GITHUB_ENV

          echo "FINAL LOOKBACK_HOURS=$LOOKBACK_HOURS"

      - name: Run news collector
        run: python main.py
        env:
          LOOKBACK_HOURS: ${{ env.LOOKBACK_HOURS }}
          PAST_DAYS: ${{ env.PAST_DAYS }}
          MAX_ITEMS: ${{ env.MAX_ITEMS }}
          DUP_THRESHOLD: ${{ env.DUP_THRESHOLD }}
