name: Daily News Collection

on:
  schedule:
    - cron: "0 7 * * 2-5"   # Tue-Fri morning → 24h lookback
    - cron: "0 14 * * 1-5"  # Mon-Fri afternoon → 7h lookback
    - cron: "0 7 * * 1"     # Monday morning only → 72h lookback
    - cron: "35 11 * * *"   # test run — fires 08:15 UTC = 09:15 BST today
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Override lookback hours'
        required: false
        default: ''
        type: string
        

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      # ── 3. Free disk space (sentence-transformers model can be large) ──
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      # ── 5. Resolve runtime config ─────────────────────────────────────
      #    Scheduled runs always use fixed values.
      #    Manual (workflow_dispatch) runs use the chosen inputs.
      
      - name: Resolve config
        run: |
          echo "LOOKBACK_HOURS=${{ github.event.inputs.lookback_hours }}" >> $GITHUB_ENV
          echo "PAST_DAYS=2"       >> $GITHUB_ENV
          echo "MAX_ITEMS=30"      >> $GITHUB_ENV
          echo "DUP_THRESHOLD=0.7" >> $GITHUB_ENV
          echo "--- Trigger: ${{ github.event_name }} ---"
          echo "--- UTC time: $(date -u) ---"
          
      # ── 6. Run the collector ───────────────────────────────────────────
      - name: Run news collector
        run: python main.py
        env:
          LOOKBACK_HOURS:  ${{ env.LOOKBACK_HOURS }}
          PAST_DAYS:       ${{ env.PAST_DAYS }}
          MAX_ITEMS:       ${{ env.MAX_ITEMS }}
          DUP_THRESHOLD:   ${{ env.DUP_THRESHOLD }}
          EXTRACT_CONTENT: "false"   # Off — Google RSS redirect URLs break trafilatura

      # ── 7. Clean up intermediate files ────────────────────────────────
      - name: Clean up intermediate files
        run: |
          rm -f data/google_news_raw_*.xlsx
          rm -f data/search_audit_*.xlsx
          rm -f data/google_news_dedup_audit_*.xlsx
          echo "--- Files remaining in data/ ---"
          ls -lah data/

      # ── 8. Commit latest_deduped.xlsx to repo ─────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add data/latest_deduped.xlsx
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update latest_deduped.xlsx [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
