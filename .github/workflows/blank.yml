name: Daily Python Job

on:
  schedule:
    - cron: "0 8 * * *"    # 09:00 Amsterdam (winter) -> 18h lookback
    - cron: "0 14 * * *"   # 15:00 Amsterdam (winter) -> 6h lookback
  workflow_dispatch:
    inputs:
      use_gdelt:
        description: 'Enable GDELT data source (FREE)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      use_reddit:
        description: 'Enable Reddit search (FREE)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      use_apify_twitter:
        description: 'Enable Twitter via Apify (requires APIFY_TOKEN secret)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      use_rapidapi_twitter:
        description: 'Enable Twitter via RapidAPI (requires RAPIDAPI_KEY secret)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      extract_content:
        description: 'Extract full article content'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      use_newsapi:
        description: 'Enable NewsAPI (requires NEWSAPI_KEY secret)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo apt-get clean

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Set lookback hours for this run
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "08" ]; then echo "LOOKBACK_HOURS=18" >> $GITHUB_ENV; fi
          if [ "$HOUR" = "14" ]; then echo "LOOKBACK_HOURS=6"  >> $GITHUB_ENV; fi
          # Default to 18 hours if not set (manual trigger)
          if [ -z "$LOOKBACK_HOURS" ]; then echo "LOOKBACK_HOURS=18" >> $GITHUB_ENV; fi
          echo "LOOKBACK_HOURS set to: $LOOKBACK_HOURS"

      - name: Run script
        run: |
          python main.py
        env:
          LOOKBACK_HOURS: ${{ env.LOOKBACK_HOURS }}
          # News data sources
          USE_GDELT: ${{ github.event.inputs.use_gdelt || 'true' }}
          USE_NEWSAPI: ${{ github.event.inputs.use_newsapi || 'false' }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          # Social media sources (FREE options!)
          USE_REDDIT: ${{ github.event.inputs.use_reddit || 'true' }}
          USE_APIFY_TWITTER: ${{ github.event.inputs.use_apify_twitter || 'false' }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          USE_RAPIDAPI_TWITTER: ${{ github.event.inputs.use_rapidapi_twitter || 'false' }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          # Content extraction
          EXTRACT_CONTENT: ${{ github.event.inputs.extract_content || 'true' }}
          MAX_EXTRACT_WORKERS: "5"
          EXTRACT_TIMEOUT: "10"

      - name: Keep only dedup XLSX
        run: |
          rm -f data/google_news_raw_*.xlsx
          rm -f data/search_audit_*.xlsx
          rm -f data/google_news_dedup_audit_*.xlsx
          ls -lah data

      - name: Commit XLSX to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/latest_deduped.xlsx
          git commit -m "Update latest deduped XLSX" || echo "No changes"
          git push
